name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: workmanagement
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev -d workmanagement"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Integration tests (with Postgres)
        run: pnpm test
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            project: chromium
            install: chromium
          - browser: firefox
            project: firefox
            install: firefox
          - browser: mobile-chrome
            project: Mobile Chrome
            install: chromium

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: workmanagement
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev -d workmanagement"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @workmanagement/web exec playwright install --with-deps ${{ matrix.install }}

      - name: Run E2E tests
        run: pnpm --filter @workmanagement/web exec playwright test --project="${{ matrix.project }}" --reporter=list
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement
          CI_SKIP_DOCKER_SETUP: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: apps/web/playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to Render
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy via webhook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
