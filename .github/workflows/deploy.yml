name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: workmanagement
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
--health-cmd "pg_isready -U dev -d workmanagement"          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

  deploy:
    name: Deploy to Render
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy via webhook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
