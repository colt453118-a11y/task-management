name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: workmanagement
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U dev -d workmanagement
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: workmanagement
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >--
          --health-cmd pg_isready -U dev -d workmanagement
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >--
          --health-cmd redis-cli ping
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Push schema
        run: pnpm db:push
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement

      - name: Build Next.js
        run: pnpm --filter @workmanagement/web build
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          AUTH_SECRET: ci-build-secret
          AUTH_URL: http://localhost:3000

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: workmanagement_test
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >--
          --health-cmd pg_isready -U dev -d workmanagement_test
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement_test
          NEXT_PUBLIC_APP_URL: http://localhost:3000
