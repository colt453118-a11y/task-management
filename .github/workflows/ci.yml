name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  ci:
    name: Typecheck → Test → Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: workmanagement
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev -d workmanagement"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with Postgres)
        run: pnpm test
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement

      - name: Lint
        run: pnpm lint
