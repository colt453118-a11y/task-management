name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: workmanagement
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U dev -d workmanagement
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: workmanagement
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >--
          --health-cmd pg_isready -U dev -d workmanagement
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4.9-alpine
        ports:
          - 6379:6379
        options: >--
          --health-cmd redis-cli ping
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Push schema
        run: pnpm db:push
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement

      - name: Build Next.js
        run: pnpm --filter @workmanagement/web build
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          AUTH_SECRET: ci-build-secret
          AUTH_URL: http://localhost:3000

  docker-scan:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Trivy
        uses: aquasecurity/trivy-action@0.29.0
        with:
          # Dummy scan to install trivy CLI on the runner
          image-ref: scratch
          format: sarif
          output: trivy-null.sarif
        continue-on-error: true

      - name: Trivy — Scan third-party base images
        run: |
          for image in \
            postgres:17.10-alpine \
            redis:7.4.9-alpine \
            minio/minio:RELEASE.2025-10-15T17-29-55Z \
            getmeili/meilisearch:v1.12 \
            axllent/mailpit:v1.30.3; do
            name=$(echo "$image" | tr '/:' '__')
            echo "=== Scanning $image ==="
            trivy image \
              --exit-code 1 \
              --severity CRITICAL,HIGH \
              --ignore-unfixed \
              --format sarif \
              --output "trivy-$name.sarif" \
              "$image"
          done

      - name: Upload base image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-*.sarif
          category: base-images

      - name: Build app Docker image
        run: docker build -t wm-app:ci .

      - name: Trivy — Scan app Docker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format sarif \
            --output trivy-app.sarif \
            wm-app:ci

      - name: Upload app image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-app.sarif
          category: app-image

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: workmanagement_test
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >--
          --health-cmd pg_isready -U dev -d workmanagement_test
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement_test
          NEXT_PUBLIC_APP_URL: http://localhost:3000
