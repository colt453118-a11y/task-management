name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Regenerate Playwright visual regression screenshots (chromium only)'
        type: boolean
        default: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  ci:
    name: Typecheck → Test → Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: workmanagement
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev -d workmanagement"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with Postgres)
        run: pnpm test
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement

      - name: Lint
        run: pnpm lint

  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            project: chromium
            install: chromium
          - browser: firefox
            project: firefox
            install: firefox
          - browser: mobile-chrome
            project: Mobile Chrome
            install: chromium
    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: workmanagement
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev -d workmanagement"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @workmanagement/web exec playwright install --with-deps ${{ matrix.install }}

      - name: Run E2E tests
        if: github.event.inputs.update_snapshots != 'true' || matrix.browser == 'chromium'
        run: >
          pnpm --filter @workmanagement/web exec playwright test
          --project="${{ matrix.project }}"
          --reporter=list
          ${{ github.event.inputs.update_snapshots == 'true' && '--update-snapshots' || '' }}
        env:
          DATABASE_URL: postgres://dev:devpassword@localhost:5432/workmanagement
          CI_SKIP_DOCKER_SETUP: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload updated screenshots
        if: github.event.inputs.update_snapshots == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: updated-screenshots-chromium-linux
          path: apps/web/__tests__/e2e/task-dependency-graph.spec.ts-snapshots/
          retention-days: 7
