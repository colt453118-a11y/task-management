# Dependabot — security-focused dependency updates
# Renovate handles regular, grouped dependency management (renovate.json)
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # Dependabot handles security alerts natively via GitHub Advisory Database
    # These are version updates (non-security) to keep lockfile fresh
    versioning-strategy: increase
    # Only update direct dependencies, not transitive ones
    allow:
      - dependency-type: "direct"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
