services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wm-web
    # Only the web service needs host port exposure
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: "https://workmanager.example.com"
      DATABASE_URL: "postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}"
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_URL: "https://workmanager.example.com"
      REDIS_URL: "redis://redis:6379"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY_ID: "${MINIO_ACCESS_KEY}"
      S3_SECRET_ACCESS_KEY: "${MINIO_SECRET_KEY}"
      S3_BUCKET: "workmanagement-files"
      MEILISEARCH_HOST: "http://meilisearch:7700"
      MEILISEARCH_API_KEY: "${MEILI_MASTER_KEY}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "587"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      EMAIL_FROM: "${EMAIL_FROM}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    mem_limit: 1g
    cpus: "2.0"

  postgres:
    image: postgres:17.10-alpine
    container_name: wm-postgres
    environment:
      POSTGRES_DB: "${DB_NAME:-workmanagement}"
      POSTGRES_USER: "${DB_USER:-wmuser}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    # No host port — database is only accessible via Docker internal network
    ports: []
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wmuser} -d ${DB_NAME:-workmanagement}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    mem_limit: 1g
    cpus: "1.0"

  redis:
    image: redis:7.4.9-alpine
    container_name: wm-redis
    # No host port — only accessible via Docker internal network
    ports: []
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    mem_limit: 256m
    cpus: "0.5"

  minio:
    image: minio/minio:RELEASE.2025-10-15T17-29-55Z
    container_name: wm-minio
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
    # No host port — only accessible via Docker internal network
    ports: []
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    mem_limit: 512m
    cpus: "1.0"

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: wm-meilisearch
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY}"
    # No host port — only accessible via Docker internal network
    ports: []
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    mem_limit: 512m
    cpus: "1.0"

  migrate:
    image: node:20.18.3-alpine
    container_name: wm-migrate
    profiles:
      - migrate
    working_dir: /app
    environment:
      DATABASE_URL: "postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}"
    volumes:
      - ./packages/database:/app/packages/database
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./turbo.json:/app/turbo.json
    command: >
      sh -c "corepack enable && corepack prepare pnpm@10 --activate && pnpm install --frozen-lockfile && pnpm db:migrate"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    mem_limit: 512m
    cpus: "1.0"

volumes:
  pgdata:
  redisdata:
  miniodata:
  meilidata:
